name: Weekly Account Engagement Report

on:
  schedule:
    # Every Monday at 8:00 AM IST (2:30 AM UTC)
    - cron: "30 2 * * 1"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  send-weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send weekly report
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:   ${{ secrets.SUPABASE_ANON_KEY }}
          EMAILJS_SERVICE_ID:   ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID:  ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY:   ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY:  ${{ secrets.EMAILJS_PRIVATE_KEY }}
          REPORT_TO_EMAIL_1:    ${{ secrets.REPORT_TO_EMAIL_1 }}
          REPORT_TO_EMAIL_2:    ${{ secrets.REPORT_TO_EMAIL_2 }}
        run: node send-report.js weekly
