# Pings Supabase every day at 6am IST to prevent free-tier pausing
name: Supabase Keep-Alive

on:
  schedule:
    - cron: '30 0 * * *'   # Daily 12:30am UTC = 6am IST
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/app_data?id=eq.1&select=id" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "406" ]; then
            echo "✅ Supabase is alive"
          else
            echo "⚠️ Supabase returned $STATUS — may need manual restore"
          fi
